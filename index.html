<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: #0a0a0a;
        }

        /* ===== FULL SCREEN ENVELOPE ===== */
        .envelope-screen {
            position: fixed;
            inset: 0;
            z-index: 50;
            overflow: hidden;
        }

        /* Top half */
        .env-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, #e8d5a3 0%, #dcc48e 40%, #d4b87a 80%, #c9a96e 100%);
            transition: transform 1.4s cubic-bezier(0.65, 0, 0.35, 1);
            z-index: 2;
            overflow: hidden;
        }
        .env-top::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(139,109,60,0.4);
        }

        /* Bottom half */
        .env-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(0deg, #e8d5a3 0%, #dcc48e 40%, #d4b87a 80%, #c9a96e 100%);
            transition: transform 1.4s cubic-bezier(0.65, 0, 0.35, 1);
            z-index: 2;
            overflow: hidden;
        }
        .env-bottom::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(139,109,60,0.4);
        }

        /* Envelope opened */
        .envelope-screen.opened .env-top {
            transform: translateY(-105%);
        }
        .envelope-screen.opened .env-bottom {
            transform: translateY(105%);
        }

        /* Parchment texture overlay */
        .env-texture {
            position: absolute;
            inset: 0;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23000' fill-opacity='1'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20.5z'/%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Gold emboss lines on envelope */
        .env-emboss {
            position: absolute;
            inset: 20px;
            border: 1px solid rgba(180,150,80,0.12);
            pointer-events: none;
        }
        .env-emboss-inner {
            position: absolute;
            inset: 28px;
            border: 1px solid rgba(180,150,80,0.08);
            pointer-events: none;
        }

        /* Decorative V pattern on top envelope */
        .env-top .env-v {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 50vw solid transparent;
            border-right: 50vw solid transparent;
            border-bottom: 25vh solid rgba(180,150,80,0.06);
        }
        .env-bottom .env-v {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 50vw solid transparent;
            border-right: 50vw solid transparent;
            border-top: 25vh solid rgba(180,150,80,0.06);
        }

        /* ===== WAX SEAL ===== */
        .seal-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .seal {
            width: 96px;
            height: 96px;
            position: relative;
            cursor: pointer;
            animation: sealFloat 3s ease-in-out infinite;
        }
        @keyframes sealFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .seal-wax {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle at 38% 35%, #e63946 0%, #c1121f 35%, #9b1b1f 55%, #780000 80%, #4a0000 100%);
            box-shadow:
                0 8px 30px rgba(120, 0, 0, 0.7),
                0 2px 10px rgba(0,0,0,0.4),
                inset 0 2px 6px rgba(255,180,180,0.2),
                inset 0 -4px 10px rgba(0,0,0,0.4);
        }
        /* Wax blob shape */
        .seal-wax::before {
            content: '';
            position: absolute;
            inset: -8px;
            background: radial-gradient(circle at 38% 35%, #d62828 0%, #a4161a 40%, #6a040f 80%);
            border-radius: 48% 52% 50% 50% / 52% 48% 52% 48%;
            z-index: -1;
        }
        /* Inner ring */
        .seal-wax::after {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1.5px solid rgba(255,200,200,0.12);
            border-radius: 50%;
        }

        .seal-letter {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Great Vibes', cursive;
            font-size: 38px;
            color: rgba(255, 210, 210, 0.85);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            padding-bottom: 2px;
        }

        .seal-shine {
            position: absolute;
            top: 14px;
            left: 20px;
            width: 22px;
            height: 10px;
            background: rgba(255,255,255,0.12);
            border-radius: 50%;
            transform: rotate(-25deg);
        }

        .seal-hint {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            color: rgba(139,109,60,0.6);
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: hintPulse 2.5s ease-in-out infinite;
        }
        @keyframes hintPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }

        /* Seal crack animation */
        .envelope-screen.opened .seal-container {
            animation: sealBreak 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
        }
        @keyframes sealBreak {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
        }

        /* ===== CONTENT BEHIND ENVELOPE ===== */
        .content-screen {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse at 50% 30%, #1a0a2e 0%, #0d0015 50%, #050008 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            opacity: 0;
            transition: opacity 0.8s ease 0.6s;
        }
        .content-screen.visible {
            opacity: 1;
        }

        /* Ambient glow */
        .ambient {
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(193,18,31,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Floating hearts background */
        .bg-hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-heart {
            position: absolute;
            font-size: 14px;
            opacity: 0;
            animation: heartRise linear infinite;
        }
        @keyframes heartRise {
            0% { transform: translateY(100vh) translateX(0) scale(0.5) rotate(0deg); opacity: 0; }
            8% { opacity: 0.25; }
            50% { transform: translateY(50vh) translateX(20px) scale(0.8) rotate(15deg); }
            92% { opacity: 0.25; }
            100% { transform: translateY(-10vh) translateX(-10px) scale(1) rotate(-10deg); opacity: 0; }
        }

        /* ===== MAIN CARD ===== */
        .card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 50px 28px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            justify-content: center;
        }

        /* Photo */
        .photo-wrapper {
            position: relative;
            margin-bottom: 28px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease forwards 0.2s;
        }
        .photo-ring {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #d4a84b 0%, #f0d78c 25%, #d4a84b 50%, #b8944a 75%, #d4a84b 100%);
            background-size: 200% 200%;
            animation: shimmer 3s ease-in-out infinite;
            box-shadow:
                0 0 30px rgba(212,168,75,0.25),
                0 0 60px rgba(212,168,75,0.1);
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .photo-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }
        .photo-heart {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #c1121f, #9b1b1f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #fff;
            box-shadow: 0 3px 12px rgba(193,18,31,0.5);
            border: 2px solid #1a0a2e;
        }

        /* Name */
        .her-dear {
            font-size: 0.85rem;
            color: rgba(212,168,75,0.6);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.5s;
        }
        .her-name {
            font-family: 'Great Vibes', cursive;
            font-size: 2.6rem;
            color: #e8d5a3;
            margin-bottom: 24px;
            line-height: 1.2;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.7s;
        }

        /* Divider */
        .line-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,168,75,0.4), transparent);
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 0.9s;
        }

        /* Message with typewriter */
        .msg-container {
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 1.1s;
        }
        .msg {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            color: rgba(230, 220, 200, 0.75);
            line-height: 2;
            text-align: center;
            font-weight: 300;
            font-style: italic;
        }
        .msg-line {
            display: block;
            overflow: hidden;
        }

        /* The Question */
        .the-question {
            font-family: 'Playfair Display', serif;
            font-size: 1.55rem;
            color: #e8d5a3;
            font-weight: 600;
            margin-bottom: 36px;
            line-height: 1.4;
            text-align: center;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 1.5s;
            position: relative;
        }
        .the-question::before,
        .the-question::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30px;
            height: 1px;
            background: rgba(212,168,75,0.3);
        }
        .the-question::before { right: 100%; margin-right: 12px; }
        .the-question::after { left: 100%; margin-left: 12px; }

        /* Buttons */
        .btn-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 280px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 1.8s;
            position: relative;
            min-height: 120px;
        }
        .btn-yes {
            width: 100%;
            padding: 16px 0;
            background: linear-gradient(135deg, #c1121f 0%, #9b1b1f 100%);
            color: #fff;
            border: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(193,18,31,0.4);
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-yes:active {
            transform: scale(0.97);
            box-shadow: 0 3px 15px rgba(193,18,31,0.5);
        }
        .btn-no {
            padding: 12px 32px;
            background: transparent;
            color: rgba(212,168,75,0.35);
            border: 1px solid rgba(212,168,75,0.12);
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.35s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Footer note */
        .footer-note {
            margin-top: 40px;
            font-size: 0.75rem;
            color: rgba(212,168,75,0.2);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards 2.2s;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== CELEBRATION ===== */
        .cele-screen {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: radial-gradient(ellipse at 50% 40%, #1a0a2e 0%, #050008 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }
        .cele-screen.active {
            opacity: 1;
            pointer-events: all;
        }

        .cele-heart-burst {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
        }
        .cele-main-heart {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            color: #c1121f;
            animation: bigPulse 1.2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(193,18,31,0.5));
        }
        @keyframes bigPulse {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.2); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
        }
        .burst-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 18px;
            opacity: 0;
        }

        .cele-text {
            font-family: 'Great Vibes', cursive;
            font-size: 2.8rem;
            color: #e8d5a3;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 0.8s ease forwards 0.4s;
        }
        .cele-sub {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            color: rgba(212,168,75,0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 0.8s ease forwards 0.7s;
        }
        .cele-photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(212,168,75,0.3);
            margin-top: 30px;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeUp 0.8s ease forwards 1s;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            top: -15px;
            z-index: 300;
            pointer-events: none;
        }
        @keyframes confDrop {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            75% { opacity: 0.8; }
            100% { transform: translateY(105vh) rotate(540deg) scale(0.5); opacity: 0; }
        }

        /* ===== PARTICLES ===== */
        .sparkle {
            position: fixed;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.8; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- ===== ENVELOPE (full screen, splits open) ===== -->
    <div class="envelope-screen" id="envelopeScreen">
        <!-- Top half -->
        <div class="env-top">
            <div class="env-texture"></div>
            <div class="env-emboss"></div>
            <div class="env-emboss-inner"></div>
            <div class="env-v"></div>
        </div>

        <!-- Bottom half -->
        <div class="env-bottom">
            <div class="env-texture"></div>
            <div class="env-emboss"></div>
            <div class="env-emboss-inner"></div>
            <div class="env-v"></div>
        </div>

        <!-- Seal at center -->
        <div class="seal-container" id="sealContainer">
            <div class="seal" id="seal">
                <div class="seal-wax">
                    <span class="seal-letter">V</span>
                    <div class="seal-shine"></div>
                </div>
            </div>
            <span class="seal-hint">Tap to open</span>
        </div>
    </div>

    <!-- ===== CONTENT SCREEN (revealed behind envelope) ===== -->
    <div class="content-screen" id="contentScreen">
        <div class="ambient"></div>
        <div class="bg-hearts" id="bgHearts"></div>

        <div class="card">
            <div class="photo-wrapper">
                <div class="photo-ring">
                    <img src="mabel.jpg" alt="Mabel" id="herPhoto">
                </div>
                <div class="photo-heart">&hearts;</div>
            </div>

            <p class="her-dear">My Dearest</p>
            <h1 class="her-name">Mabel Eniola</h1>
            <div class="line-divider"></div>

            <div class="msg-container">
                <p class="msg" id="typeMsg"></p>
            </div>

            <p class="the-question">Will You Be<br>My Valentine?</p>

            <div class="btn-row" id="btnRow">
                <button class="btn-yes" id="btnYes">Yes, I Will</button>
                <button class="btn-no" id="btnNo">No</button>
            </div>

            <p class="footer-note">Valentine 2026</p>
        </div>
    </div>

    <!-- ===== CELEBRATION ===== -->
    <div class="cele-screen" id="celeScreen">
        <div class="cele-heart-burst" id="heartBurst">
            <div class="cele-main-heart">&hearts;</div>
        </div>
        <p class="cele-text">She Said Yes!</p>
        <p class="cele-sub">Happy Valentine's Day</p>
        <img src="mabel.jpg" alt="Mabel" class="cele-photo" id="celePhoto">
    </div>

    <script>
        // ===== BACKGROUND HEARTS =====
        (function() {
            const container = document.getElementById('bgHearts');
            const hearts = ['\u2665', '\u2764', '\u2661'];
            for (let i = 0; i < 15; i++) {
                const h = document.createElement('div');
                h.className = 'bg-heart';
                h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                h.style.cssText =
                    'left:' + (Math.random() * 100) + '%;' +
                    'color:rgba(193,18,31,' + (Math.random() * 0.15 + 0.05) + ');' +
                    'font-size:' + (Math.random() * 12 + 10) + 'px;' +
                    'animation-duration:' + (Math.random() * 6 + 8) + 's;' +
                    'animation-delay:' + (Math.random() * 10) + 's;';
                container.appendChild(h);
            }
        })();

        // ===== SPARKLES =====
        (function() {
            var colors = ['rgba(212,168,75,0.6)', 'rgba(193,18,31,0.4)', 'rgba(255,255,255,0.3)'];
            for (var i = 0; i < 20; i++) {
                var s = document.createElement('div');
                s.className = 'sparkle';
                var size = Math.random() * 3 + 1;
                s.style.cssText =
                    'width:' + size + 'px;height:' + size + 'px;' +
                    'left:' + (Math.random() * 100) + '%;' +
                    'top:' + (Math.random() * 100) + '%;' +
                    'background:' + colors[Math.floor(Math.random() * colors.length)] + ';' +
                    'animation:sparkleAnim ' + (Math.random() * 3 + 2) + 's ease-in-out ' + (Math.random() * 4) + 's infinite;';
                document.getElementById('contentScreen').appendChild(s);
            }
        })();

        // ===== SEAL TAP → OPEN ENVELOPE =====
        var envelopeScreen = document.getElementById('envelopeScreen');
        var contentScreen = document.getElementById('contentScreen');
        var sealEl = document.getElementById('seal');
        var opened = false;

        sealEl.addEventListener('click', openEnvelope);
        sealEl.addEventListener('touchend', function(e) {
            e.preventDefault();
            openEnvelope();
        });

        function openEnvelope() {
            if (opened) return;
            opened = true;

            // Add haptic feedback if available
            if (navigator.vibrate) navigator.vibrate(50);

            envelopeScreen.classList.add('opened');
            contentScreen.classList.add('visible');

            // Start typewriter after envelope opens
            setTimeout(startTypewriter, 2000);
        }

        // ===== TYPEWRITER MESSAGE =====
        var msgEl = document.getElementById('typeMsg');
        var fullMessage = [
            "In a world full of faces,",
            "yours is the only one",
            "my heart chose to remember.",
            "",
            "Every moment with you",
            "feels like a gift I never",
            "want to stop unwrapping.",
            "",
            "So here I am, asking you..."
        ];

        function startTypewriter() {
            var lineIdx = 0;
            var charIdx = 0;
            var html = '';

            function type() {
                if (lineIdx >= fullMessage.length) return;

                var line = fullMessage[lineIdx];

                if (line === '') {
                    html += '<br>';
                    lineIdx++;
                    setTimeout(type, 300);
                    return;
                }

                if (charIdx < line.length) {
                    if (charIdx === 0 && lineIdx > 0 && fullMessage[lineIdx - 1] !== '') {
                        html += '<br>';
                    } else if (charIdx === 0 && lineIdx === 0) {
                        // first line, do nothing
                    }
                    html += line[charIdx];
                    msgEl.innerHTML = html + '<span style="opacity:0.4">|</span>';
                    charIdx++;
                    setTimeout(type, 40);
                } else {
                    charIdx = 0;
                    lineIdx++;
                    setTimeout(type, 200);
                }
            }

            type();
        }

        // ===== YES BUTTON =====
        var btnYes = document.getElementById('btnYes');
        var btnNo = document.getElementById('btnNo');
        var celeScreen = document.getElementById('celeScreen');

        btnYes.addEventListener('click', function() {
            if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
            contentScreen.style.transition = 'opacity 0.5s ease';
            contentScreen.style.opacity = '0';
            setTimeout(function() {
                celeScreen.classList.add('active');
                burstHearts();
                fireConfetti();
            }, 500);
        });

        // ===== NO BUTTON - it runs away =====
        var noCount = 0;
        var noWords = ['No', 'Really?', 'Sure?', 'Think again', 'Please?', 'One more try', 'Nope!'];

        function evadeNo(e) {
            if (e) e.preventDefault();
            noCount++;
            if (navigator.vibrate) navigator.vibrate(20);

            if (noCount < noWords.length) {
                btnNo.textContent = noWords[noCount];
            }

            var row = document.getElementById('btnRow');
            var rowRect = row.getBoundingClientRect();
            var btnRect = btnNo.getBoundingClientRect();

            var maxX = rowRect.width - btnRect.width;
            var maxY = rowRect.height - btnRect.height;
            var x = Math.random() * maxX;
            var y = Math.random() * maxY;

            btnNo.style.position = 'absolute';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
            btnNo.style.transition = 'all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';

            if (noCount >= 4) {
                var scale = Math.max(0, 1 - (noCount - 3) * 0.2);
                btnNo.style.transform = 'scale(' + scale + ')';
                btnNo.style.opacity = scale;
            }
            if (noCount >= 7) {
                btnNo.style.display = 'none';
            }

            // Grow the Yes button slightly each time
            var yesScale = 1 + noCount * 0.03;
            btnYes.style.transform = 'scale(' + Math.min(yesScale, 1.15) + ')';
        }

        btnNo.addEventListener('touchstart', evadeNo);
        btnNo.addEventListener('mouseover', evadeNo);

        // ===== HEART BURST =====
        function burstHearts() {
            var container = document.getElementById('heartBurst');
            for (var i = 0; i < 12; i++) {
                var h = document.createElement('div');
                h.className = 'burst-heart';
                h.textContent = '\u2665';
                var angle = (i / 12) * 360;
                var rad = angle * Math.PI / 180;
                var dist = 60 + Math.random() * 30;
                var tx = Math.cos(rad) * dist;
                var ty = Math.sin(rad) * dist;
                h.style.color = ['#c1121f', '#d4a84b', '#ff6b6b', '#e8d5a3'][Math.floor(Math.random() * 4)];
                h.style.fontSize = (12 + Math.random() * 10) + 'px';
                h.style.transition = 'all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                container.appendChild(h);

                (function(el, x, y) {
                    setTimeout(function() {
                        el.style.opacity = '0.8';
                        el.style.transform = 'translate(calc(-50% + ' + x + 'px), calc(-50% + ' + y + 'px))';
                        setTimeout(function() {
                            el.style.opacity = '0';
                            el.style.transform = 'translate(calc(-50% + ' + (x * 1.5) + 'px), calc(-50% + ' + (y * 1.5) + 'px))';
                        }, 600);
                    }, 50);
                })(h, tx, ty);
            }
        }

        // ===== CONFETTI =====
        function fireConfetti() {
            var colors = ['#c1121f', '#d4a84b', '#ff6b6b', '#ffd700', '#e8d5a3', '#fff'];
            var shapes = ['50%', '2px', '0'];
            for (var i = 0; i < 50; i++) {
                var c = document.createElement('div');
                c.className = 'confetti';
                var w = Math.random() * 8 + 4;
                var h = Math.random() * 8 + 4;
                c.style.cssText =
                    'left:' + (Math.random() * 100) + '%;' +
                    'width:' + w + 'px;height:' + h + 'px;' +
                    'background:' + colors[Math.floor(Math.random() * colors.length)] + ';' +
                    'border-radius:' + shapes[Math.floor(Math.random() * shapes.length)] + ';' +
                    'animation:confDrop ' + (Math.random() * 2 + 2) + 's linear ' + (Math.random() * 2) + 's forwards;';
                document.body.appendChild(c);
            }
        }

        // ===== PHOTO FALLBACK =====
        document.getElementById('herPhoto').onerror = function() {
            this.parentElement.innerHTML = '<div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#1a0a2e,#2d1b4e);display:flex;align-items:center;justify-content:center;font-size:52px;color:rgba(193,18,31,0.7);">\u2665</div>';
        };
        document.getElementById('celePhoto').onerror = function() {
            this.style.display = 'none';
        };
    </script>
</body>
</html>
